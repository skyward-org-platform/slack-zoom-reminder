    match: "Transport Media"
    slack_channel: "C0AET7N3BRC"  # #int-transport-media
  - name: "PLP"
    match: "Philippe Lasry"
    slack_channel: "C0AMWM2KS10"  # #int-phil-lasry
  - name: "KWEV"
    match: "Kwev"
    slack_channel: "C0ALM59CCHF"  # #int-kwev
  - name: "GCS"
    match: "GCS"
